<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Simple redirect for SPA routing on static hosting
      var path = window.location.pathname;
      window.location.href = "/?redirect=" + encodeURIComponent(path);
    </script>
  </head>
  <body>
  </body>
</html>
